# ─────────────────────────────────────────────────────────────
#  PotholeIQ — application.properties
#  DB credentials & mail credentials are injected by DotenvConfig
#  from the .env file at startup (see DotenvConfig.java)
# ─────────────────────────────────────────────────────────────

server.port=8080

# ── DataSource (values populated by DotenvConfig) ──────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── File Upload Limits ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Mail (Brevo SMTP) — credentials injected by DotenvConfig ──
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── App Custom Properties ──────────────────────────────────────
app.upload.dir=./uploads/images/
app.complaints.dir=./uploads/complaints/
app.models.dir=./models/
complaint.ward-email=wardoffice@municipality.gov

# ── Logging ────────────────────────────────────────────────────
logging.level.com.potholeiq=INFO
logging.level.org.hibernate.SQL=WARN
